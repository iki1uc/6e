<canvas id="ortCanvas" width="500" height="500"></canvas>

<script>
const c = document.getElementById("ortCanvas");
const x = c.getContext("2d");

let t = 0;

function drawORT() {
    x.clearRect(0,0,500,500);

    // --- 3e-Re Dreieck ---
    const tri = [
        [250,100],
        [100,400],
        [400,400]
    ];
    x.strokeStyle = "#6cf";
    x.lineWidth = 3;
    x.beginPath();
    tri.forEach(([px,py],i)=>{
        if(i===0) x.moveTo(px,py);
        else x.lineTo(px,py);
    });
    x.closePath();
    x.stroke();

    // --- 6e Hexagon ---
    const hexR = 120;
    x.strokeStyle = "#0f0";
    x.beginPath();
    for(let i=0;i<6;i++){
        const a = t + i*Math.PI/3;
        const px = 250 + Math.cos(a)*hexR;
        const py = 250 + Math.sin(a)*hexR;
        if(i===0) x.moveTo(px,py);
        else x.lineTo(px,py);
    }
    x.closePath();
    x.stroke();

    // --- 12e Dodecagon ---
    const dodR = 180;
    x.strokeStyle = "#f90";
    x.beginPath();
    for(let i=0;i<12;i++){
        const a = t + i*Math.PI/6;
        const px = 250 + Math.cos(a)*dodR;
        const py = 250 + Math.sin(a)*dodR;
        if(i===0) x.moveTo(px,py);
        else x.lineTo(px,py);
    }
    x.closePath();
    x.stroke();

    // --- 6d Gesetz-Scan ---
    x.fillStyle = "#6cf";
    x.fillRect(50,480,400*(0.5+Math.sin(t)/2),10);

    // --- Octa³ Blink ---
    if(Math.sin(t*3) > 0.8){
        x.fillStyle = "#f00";
        x.fillRect(10,10,20,20);
    }

    t += 0.02;
    requestAnimationFrame(drawORT);
}
drawORT();
</script>
