<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>6e – Ring‑Scanner</title>

  <style>
    body {
      background: #000;
      margin: 0;
      overflow: hidden;
    }
    #ortCanvas {
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>

  <!-- ⭐ 6e‑Module laden -->
  <script src="6E.respo"></script>
  <script src="FREQ.html"></script>
  <script src="GEO.html"></script>
  <script src="ID.html"></script>
  <script src="VISIO.b.html"></script>
  <script src="VISIO.h.html"></script>
  <script src="VISIO.t.html"></script>
  <script src="6e.core.html"></script>
</head>

<body>

<canvas id="ortCanvas" width="500" height="500"></canvas>

<!-- ⭐ RING‑NAVIGATOR – verbindet Ring 1, 3 und 6 -->
<script>
const RING_NAV = {
    active: true,

    rings: {
        R1: ["IX","XI","UP","IN","SET"],     // Reset
        R3: ["X","Z","Q","U","S","D"],       // Signal
        R6: ["M","B","H","Z","ORT","HOME","ROOM"] // Meta
    },

    tmp: "D2",   // Zentrum

    find(ringName){
        return this.rings[ringName] || null;
    },

    scan(){
        return {
            reset: this.find("R1"),
            signal: this.find("R3"),
            meta: this.find("R6"),
            tmp: this.tmp
        };
    }
};
</script>

<!-- ⭐ 6E.respo – erweitert: findet Ring 1 und Ring 6 -->
<script>
const RESPO_6E = {
    active: true,

    signals: ["X","Z","Q","U","S","D"],

    connect: {
        R1: ["IX","XI","UP","IN","SET"],
        R6: ["M","B","H","Z","ORT","HOME","ROOM"]
    },

    prefetch(){
        return {
            reset: this.connect.R1,
            meta: this.connect.R6,
            signal: this.signals
        };
    },

    find(axis){
        if(this.connect.R1.includes(axis)) return "R1";
        if(this.connect.R6.includes(axis)) return "R6";
        if(this.signals.includes(axis)) return "R3";
        return null;
    }
};
</script>

<!-- ⭐ 27er‑Ring – Anmeldung (Axiom‑1: 6e) -->
<script>
const RING = {
  "27": "AKTIV",
  "AXIOM": "6e",
  "EBENEN": ["R","O","S","M","TMP"],

  RESET: ["IX","XI","UP","IN","SET"],
  OPERATOR: ["IN","DA","NE","BEN"],
  SIGNAL: ["X","Z","Q","U","S","D"],
  META: ["M","B","H","Z","ORT","HOME","ROOM"],
  TMP: ["B","H","T","RAUM","ZENTRUM"],

  NC: {
    "9to3": true,
    "3to9": true,
    "ULTRA": true
  },

  GATE: ["α","β","γ"],
  TMP_ZENTRUM: "D2"
};
</script>

<!-- ⭐ VISUAL – 3 Ringe sichtbar machen -->
<script>
function drawRings(x){
    // Ring 1 – Reset (blau)
    x.strokeStyle = "#4cf";
    x.lineWidth = 2;
    x.beginPath();
    x.arc(250,250,70,0,Math.PI*2);
    x.stroke();

    // Ring 3 – Signal (grün)
    x.strokeStyle = "#0f0";
    x.beginPath();
    x.arc(250,250,140,0,Math.PI*2);
    x.stroke();

    // Ring 6 – Meta (orange)
    x.strokeStyle = "#f90";
    x.beginPath();
    x.arc(250,250,210,0,Math.PI*2);
    x.stroke();
}
</script>

<!-- ⭐ ORT‑Canvas – 3e / 6e / 12e / 6d / Octa³ -->
<script>
const c = document.getElementById("ortCanvas");
const x = c.getContext("2d");
let t = 0;

function drawORT() {
    x.clearRect(0,0,500,500);

    drawRings(x);

    // --- 3e Dreieck ---
    const tri = [
        [250,100],
        [100,400],
        [400,400]
    ];
    x.strokeStyle = "#6cf";
    x.lineWidth = 3;
    x.beginPath();
    tri.forEach(([px,py],i)=>{
        if(i===0) x.moveTo(px,py);
        else x.lineTo(px,py);
    });
    x.closePath();
    x.stroke();

    // --- 6e Hexagon ---
    const hexR = 120;
    x.strokeStyle = "#0f0";
    x.beginPath();
    for(let i=0;i<6;i++){
        const a = t + i*Math.PI/3;
        const px = 250 + Math.cos(a)*hexR;
        const py = 250 + Math.sin(a)*hexR;
        if(i===0) x.moveTo(px,py);
        else x.lineTo(px,py);
    }
    x.closePath();
    x.stroke();

    // --- 12e Dodecagon ---
    const dodR = 180;
    x.strokeStyle = "#f90";
    x.beginPath();
    for(let i=0;i<12;i++){
        const a = t + i*Math.PI/6;
        const px = 250 + Math.cos(a)*dodR;
        const py = 250 + Math.sin(a)*dodR;
        if(i===0) x.moveTo(px,py);
        else x.lineTo(px,py);
    }
    x.closePath();
    x.stroke();

    // --- 6d Gesetz‑Scan ---
    x.fillStyle = "#6cf";
    x.fillRect(50,480,400*(0.5+Math.sin(t)/2),10);

    // --- Octa³ Blink ---
    if(Math.sin(t*3) > 0.8){
        x.fillStyle = "#f00";
        x.fillRect(10,10,20,20);
    }

    t += 0.02;
    requestAnimationFrame(drawORT);
}

drawORT();
</script>

</body>
</html>
